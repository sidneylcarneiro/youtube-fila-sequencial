<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Fila Sequencial</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            font-family: Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .video-card {
            background-color: transparent;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: scale(1.02);
        }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 12px;
        }
        .info {
            padding: 12px 0;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #f1f1f1;
            text-decoration: none;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .channel-name {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 2px;
        }
        .date {
            font-size: 12px;
            color: #aaaaaa;
        }
        a {
            text-decoration: none;
        }
        
        /* Novos estilos da barra de status */
        .stats-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .badge {
            display: inline-block;
            background-color: #272727;
            color: #aaaaaa;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin: 0 10px;
            border: 1px solid #3d3d3d;
        }
        .badge strong {
            color: #f1f1f1;
        }
    </style>
</head>
<body>

    <h1>Minha Fila Sequencial (Mais Antigos Primeiro)</h1>

    <div class="stats-container">
        <div class="badge">
            📺 <strong>{{ total_restantes }}</strong> vídeos restantes
        </div>
        <div class="badge">
            🔄 Último vídeo capturado em: <strong>{{ ultima_atualizacao }}</strong>
        </div>
    </div>

    <div class="video-grid">
        {% for video in videos %}
        <div class="video-card">
            <a href="/watch/{{ video.video_id }}" target="_blank">
                <img class="thumbnail" src="{{ video.thumbnail }}" alt="Thumbnail">
                <div class="info">
                    <div class="title">{{ video.titulo }}</div>
                    <div class="channel-name">{{ video.canal }}</div>
                    <div class="date">{{ video.publicado_em[:10] }}</div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
